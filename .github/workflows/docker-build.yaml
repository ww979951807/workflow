name: Docker Build Only

on:
  workflow_dispatch:
    inputs:
      # 你要拉取的 GitHub 项目（如：user/repo）
      projectName:
        description: 'GitHub 项目名称 (格式：owner/repo)'
        required: true
      
      # 分支 / Tag / 版本号
      projectBranch:
        description: '分支/Tag/版本'
        required: true

      # 镜像名称:版本
      outputImage:
        description: '生成的镜像名称:版本 (例如：myapp:v1.0)'
        required: true
      
      # 运行系统
      runnerType:
        description: '运行操作系统'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-22.04-arm

jobs:
  docker-build:
    runs-on: ${{ github.event.inputs.runnerType }}
    timeout-minutes: 30

    steps:
      - name: Checkout Project Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.projectName }}
          ref: ${{ github.event.inputs.projectBranch }}
          fetch-depth: 1

      - name: Checkout your custom Dockerfile
        uses: actions/checkout@v4
        with:
          path: my-custom-files

      # 3. 用你的 Dockerfile 替换目标项目里的
      - name: Replace with your Dockerfile
        run: |
          cp -f my-custom-files/Dockerfile ./Dockerfile.openclaw

      # 核心：执行 docker build
      - name: Run Docker Build
        run: |
          docker build -f Dockerfile.openclaw -t ${{ github.event.inputs.outputImage }} .

      - name: 保存镜像为压缩包
        run: |
          image="${{ github.event.inputs.outputImage }}"
          docker save "${image}" | gzip -9 > "image.tar.gz"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-tar
          path: image.tar.gz
          retention-days: 1

